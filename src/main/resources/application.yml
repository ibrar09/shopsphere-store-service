server:
  port: 8082

spring:
  application:
    name: store-service
  cloud:
    config:
      enabled: false

  # Notice the 2 spaces before datasource and jpa! They must be inside 'spring'
  datasource:
    url: jdbc:postgresql://localhost:5433/store_db
    username: store_service_user
    password: very_secure_password_123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:ShopSphereSuperSecretKeyForJwtGenerationDoNotShare}