server:
  port: 8082

spring:
  application:
    name: store-service
  cloud:
    config:
      enabled: false

  datasource:
    url: ${STORE_DB_URL:jdbc:postgresql://localhost:5437/store_db}
    username: ${STORE_DB_USER:root}
    password: ${STORE_DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${STORE_EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    # Forces the exact hostname so the Gateway inside Docker can find it
    hostname: host.docker.internal
    prefer-ip-address: false

jwt:
  secret: ${JWT_SECRET:ShopSphereSuperSecretKeyForJwtGenerationDoNotShare}